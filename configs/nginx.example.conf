# Nginx 反代配置示例 - subgw 订阅前置网关
#
# 用法:把本文件放到 /etc/nginx/sites-available/sub.example.com,然后 ln -s 到 enabled。
# 注意:1) 把 sub.example.com 替换成你的订阅域名
#       2) 证书路径要对
#       3) admin Web UI 不要直接暴露公网,要么 IP 白名单,要么 SSH 转发

# 订阅域名(用户客户端访问的)
server {
    listen 443 ssl http2;
    server_name sub.example.com;

    ssl_certificate     /etc/letsencrypt/live/sub.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sub.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # subgw 监听本地 8443
    location / {
        proxy_pass http://127.0.0.1:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 如果 nginx 在 Cloudflare 后面,需要先取出真实 IP,这里假设直挂
        # 若有 CF,请用 ngx_http_realip_module + set_real_ip_from <CF IPs>
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name sub.example.com;
    return 301 https://$host$request_uri;
}

# 管理 Web UI(可选 - 独立域名,加 IP 白名单)
server {
    listen 443 ssl http2;
    server_name subgw-admin.example.com;

    ssl_certificate     /etc/letsencrypt/live/subgw-admin.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/subgw-admin.example.com/privkey.pem;

    # 强烈建议加 IP 白名单
    # allow 1.2.3.4;
    # deny  all;

    location / {
        proxy_pass http://127.0.0.1:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
